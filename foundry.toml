[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

# Tests run against fresh state; we don't ship integration tests
# that hit Arc Testnet directly to keep CI deterministic.
[profile.default.fuzz]
runs = 256

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "preserve"

# Foundry RPC aliases — populated locally via .env.local (gitignored).
# Public RPCs intentionally listed so contributors can fork-test
# without an API key.
[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"
arc_testnet_public = "https://rpc.testnet.arc.network"
base = "${BASE_RPC_URL}"
base_public = "https://mainnet.base.org"

[etherscan]
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api" }
base = { key = "${BASESCAN_API_KEY}", chain = 8453, url = "https://api.etherscan.io/v2/api?chainid=8453" }
